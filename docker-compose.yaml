services:
  img2lottie:
    image: docker.io/tolakang/img2lottie:latest
    container_name: img2lottie
    restart: unless-stopped
    ports:
      - "5177:5177"
    environment:
      - NODE_ENV=production
      - PORT=5177
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5177"]
      interval: 30s
      timeout: 10s
      retries: 3
