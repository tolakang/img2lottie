apiVersion: v1
kind: Service
metadata:
  name: img2lottie
  labels:
    app: img2lottie
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: img2lottie
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: img2lottie
  labels:
    app: img2lottie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: img2lottie
  template:
    metadata:
      labels:
        app: img2lottie
    spec:
      containers:
        - name: frontend
          image: img2lottie-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
