version: '3.8'

services:
  img2lottie:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "5177:5177"
    environment:
      - NODE_ENV=production
      - PORT=5177
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5177"]
      interval: 30s
      timeout: 10s
      retries: 3
