version: '3.8'

services:
  img2lottie:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: img2lottie
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    restart: unless-stopped
    volumes:
      - img2lottie-data:/data

volumes:
  img2lottie-data:
