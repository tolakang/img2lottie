port: 5177
hostNetwork: false

workload:
  main:
    pod:
      containers:
        main:
          image: ghcr.io/tolakang/img2lottie:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5177"
          ports:
            - containerPort: 5177
              protocol: TCP
          resources:
            limits:
              cpu: "2000m"
              memory: 2Gi
            requests:
              cpu: "100m"
              memory: "128Mi"

data:
  persist: true
