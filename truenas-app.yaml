name: img2lottie
version: 1.0.0
description: Image2Lottie - Free Image to Lottie Converter

port: 8080
host_network: false

containers:
  - name: img2lottie
    image: ghcr.io/tolakang/img2lottie:latest
    image_policy: Always
    ports:
      - container_port: 8080
        protocol: http
    environment:
      - name: NODE_ENV
        value: production
      - name: PORT
        value: "8080"
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi

volumes:
  - name: data
    mount_path: /data

notes: |
  Image2Lottie - Free Image to Lottie Converter
  - Upload images (PNG, JPG, SVG) and convert to Lottie animations
  - Preview Lottie JSON files with full playback controls
  - Supports speed control (0.25x-3x) and FPS adjustment (1-100)
